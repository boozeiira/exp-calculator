<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EXP Calculator | Boozeiira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* Configuração Global */
    body {
      font-family: 'Orbitron', sans-serif;
      background-image: url('https://i.imgur.com/VQDUscX.png'); /* SUA IMAGEM DE FUNDO */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    /* Container Principal da Calculadora */
    .calc-container {
      width: 760px; /* Largura otimizada para overlay */
      display: flex;
      flex-direction: column;
      gap: 15px; /* Espaço entre o banner e o corpo */
    }

    /* Estilo do Banner Superior */
    .top-banner {
      width: 100%;
      height: 90px;
      background-image: url('https://i.imgur.com/5O0UkIb.jpeg'); /* SUA IMAGEM DO BANNER */
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      border: 1px solid rgba(255, 51, 51, 0.4);
      position: relative; /* Para o fantasma flutuar */
    }

    /* O Fantasma de Boné Flutuante (URL externa garantida) */
    .ghost-over {
      position: absolute;
      right: 15px;
      top: -15px;
      width: 75px;
      height: 75px;
      animation: floatStream 4s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
      z-index: 5;
    }
    @keyframes floatStream {0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}

    /* Estilo do Corpo da Calculadora */
    .calc-body {
      background-color: rgba(10, 10, 10, 0.96); /* Quase preto e semi-transparente */
      border: 2px solid #ef4444; /* Borda vermelha neon */
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(239, 68, 68, 0.3);
      backdrop-filter: blur(8px); /* Blur sutil no circuito */
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    /* Divisão em Colunas */
    .input-col { flex: 1.2; }
    .status-col { 
      flex: 1; 
      border-left: 1px solid rgba(255,255,255,0.05); 
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Títulos da Coluna */
    .col-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 15px; text-transform: uppercase; }

    /* Estilo dos Inputs (Glow Vermelho) */
    label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 3px; display: block; font-weight: 700; }
    input {
      background-color: #111 !important; /* Mais escuro */
      border: 1px solid #333 !important;
      color: white !important;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    /* Botão Calcular Neon */
    .calc-btn {
      width: 100%;
      background-color: #ef4444;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 10px;
      padding: 14px;
      transition: all 0.2s;
      margin-top: 15px;
      border-bottom: 4px solid #900;
      cursor: pointer;
    }
    .calc-btn:hover { background-color: #ff5555; transform: translateY(-2px); }
    .calc-btn:active { transform: translateY(2px); border-bottom-width: 0; }

    /* Resultados da Live */
    .live-track { background-color: #000; height: 35px; border-radius: 20px; border: 1px solid #333; padding: 4px; margin-bottom: 15px; }
    .live-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f00, #ff0); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: black; font-size: 12px; }

    .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 8px 0; }
    .stat-label { font-size: 11px; color: #555; text-transform: uppercase; }
    .stat-val { font-weight: 700; font-size: 14px; }

    /* Hora UP (Neon Ciano) */
    .up-display { text-align: center; margin: 20px 0; }
    .up-time { color: #00ffcc; font-size: 36px; font-weight: 900; text-shadow: 0 0 15px rgba(0,255,204,0.4); }

    /* Box Twitch */
    .twitch-box { background: linear-gradient(90deg, rgba(239, 68, 68, 0.1), rgba(0,0,0,0)); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: auto; }
  </style>
</head>
<body class="p-4">

<div class="calc-container">
  <div class="top-banner">
    <img src="https://i.imgur.com/NvFow5E.png" class="ghost-over" alt="Ghost Logo">
  </div>

  <div class="calc-body">
    <div class="input-col">
      <div class="col-title text-red-500">EXP TRACKER</div>
      
      <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col"><label>INÍCIO</label><input id="hora1" type="time"></div>
          <div class="flex flex-col"><label>EXP INICIAL</label><input id="exp1" type="number" placeholder="0"></div>
          <div class="flex flex-col"><label>ATUAL</label><input id="hora2" type="time"></div>
          <div class="flex flex-col"><label>EXP ATUAL</label><input id="exp2" type="number" placeholder="0"></div>
      </div>

      <div class="mt-3">
          <label>EXP TOTAL DO NÍVEL (BASE)</label>
          <input id="expTotal" type="number" placeholder="Ex: 10000000">
      </div>

      <button onclick="calcular()" class="calc-btn">CALCULAR GRIND</button>
    </div>

    <div class="status-col">
      <div class="col-title">LIVE STATUS</div>
      
      <div class="live-track">
          <div id="barra" class="live-bar">0%</div>
      </div>

      <div class="space-y-1">
          <div class="stat-line"><span class="stat-label">Rendimento</span><span id="res_min" class="stat-val text-yellow-400">-</span></div>
          <div class="stat-line"><span class="stat-label">Faltante</span><span id="res_falta" class="stat-val">-</span></div>
          <div class="stat-line"><span class="stat-label">Tempo</span><span id="res_tempo" class="stat-val">-</span></div>
      </div>

      <div class="up-display">
          <span class="stat-label mb-1.5">Previsão do UP</span>
          <div id="res_up" class="up-time">--:--</div>
      </div>

      <div class="twitch-box">
          <div class="w-2.5 h-2.5 bg-red-600 rounded-full animate-pulse"></div>
          <span class="text-[11px] font-black tracking-widest uppercase">TWITCH.TV/BOOZEIIRA</span>
      </div>
    </div>
  </div>
</div>

<script>
function calcular(){
  const h1v = document.getElementById('hora1').value;
  const h2v = document.getElementById('hora2').value;
  const e1 = parseFloat(document.getElementById('exp1').value);
  const e2 = parseFloat(document.getElementById('exp2').value);
  const et = parseFloat(document.getElementById('et').value);

  if(!h1v || !h2v || isNaN(e1) || isNaN(e2) || isNaN(et)) {
    return alert('Preencha os dados! 👻');
  }

  const [h1, m1] = h1v.split(':').map(Number);
  const [h2, m2] = h2v.split(':').map(Number);
  
  let duracao = (h2 * 60 + m2) - (h1 * 60 + m1);
  if(duracao <= 0) duracao += 1440;

  const ganho = e2 - e1;
  const expMin = ganho / duracao;
  const falta = et - e2;
  const tempoFalta = falta / expMin;
  const prog = (e2/et)*100;

  const up = new Date();
  up.setHours(h2);
  up.setMinutes(m2 + tempoFalta);
  const hFinal = up.getHours().toString().padStart(2,'0') + ":" + up.getMinutes().toString().padStart(2,'0');

  // Atualiza Tela
  document.getElementById('res_min').innerText = expMin.toFixed(0) + " EXP/MIN";
  document.getElementById('res_falta').innerText = Math.floor(falta).toLocaleString() + " EXP";
  document.getElementById('res_tempo').innerText = Math.floor(tempoFalta) + " MIN";
  document.getElementById('res_up').innerText = hFinal;
  
  const b = document.getElementById('barra');
  const progVal = (prog > 100 ? 100 : prog);
  b.style.width = progVal + "%";
  b.innerText = progVal.toFixed(1) + "%";
}
</script>

</body>
</html>
